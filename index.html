<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Motion — AI Powered TMS · Investor Deck</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --mint: #a8fbd0;
    --charcoal: #383838;
    --mint10: rgba(168,251,208,0.10);
    --mint20: rgba(168,251,208,0.20);
    --mint08: rgba(168,251,208,0.08);
    --white45: rgba(255,255,255,0.45);
    --white60: rgba(255,255,255,0.60);
    --white72: rgba(255,255,255,0.72);
    --white80: rgba(255,255,255,0.80);
    --white10: rgba(255,255,255,0.10);
    --white05: rgba(255,255,255,0.05);
  }

  html, body { height: 100%; background: var(--charcoal); }
  body { font-family: 'DM Sans', sans-serif; color: #fff; overflow: hidden; }

  #root { height: 100vh; width: 100vw; overflow: hidden; }

  /* ── Slide shell ── */
  .slide {
    position: absolute; inset: 0;
    background: var(--charcoal);
    display: flex; flex-direction: column;
    min-height: 100vh; overflow: hidden;
    animation: slideIn .35s cubic-bezier(.25,.46,.45,.94) both;
  }
  .slide.out { animation: slideOut .28s cubic-bezier(.25,.46,.45,.94) both; }

  @keyframes slideIn  { from { opacity:0; transform:translateY(22px) } to { opacity:1; transform:translateY(0) } }
  @keyframes slideOut { from { opacity:1; transform:translateY(0) }  to { opacity:0; transform:translateY(-20px) } }

  .slide-glow {
    position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(circle at 80% 10%, rgba(168,251,208,0.18) 0%, transparent 35%),
      radial-gradient(circle at 10% 90%, rgba(168,251,208,0.08) 0%, transparent 30%);
  }

  .slide-inner {
    position: relative; z-index: 1;
    max-width: 1280px; margin: 0 auto;
    width: 100%; height: 100vh;
    display: flex; flex-direction: column;
    padding: 28px 56px 24px;
  }

  /* ── Header ── */
  .deck-header {
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .logo-pill {
    display: flex; align-items: center; gap: 12px;
  }
  .logo-box {
    width: 38px; height: 38px; border-radius: 10px;
    border: 1px solid var(--white10); background: var(--white05);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px rgba(168,251,208,0.08);
    font-size: 18px; font-weight: 700; color: var(--mint);
    font-family: 'DM Mono', monospace;
  }
  .logo-label { line-height: 1.2; }
  .logo-name { font-size: 11px; text-transform: uppercase; letter-spacing: .28em; color: var(--white45); }
  .logo-sub  { font-size: 13px; color: var(--white80); }
  .slide-counter {
    border: 1px solid var(--white10); border-radius: 99px;
    padding: 4px 14px; font-size: 11px; letter-spacing: .26em;
    color: var(--white45); font-family: 'DM Mono', monospace;
  }

  /* ── Eyebrow / Title / Subtitle ── */
  .slide-main { flex: 1; display: flex; flex-direction: column; padding: 20px 0 0; overflow: hidden; }
  .eyebrow {
    font-size: 11px; font-weight: 500; text-transform: uppercase;
    letter-spacing: .3em; color: var(--mint); margin-bottom: 10px;
  }
  .slide-title {
    font-size: clamp(28px, 4vw, 52px); font-weight: 600;
    line-height: 1.12; max-width: 820px; margin-bottom: 14px;
  }
  .slide-subtitle {
    font-size: clamp(13px, 1.3vw, 17px); color: var(--white72);
    max-width: 760px; line-height: 1.6; margin-bottom: 22px;
  }
  .slide-body { flex: 1; overflow: hidden; }

  /* ── Cards ── */
  .card {
    border: 1px solid var(--white10); border-radius: 24px;
    background: var(--white05); backdrop-filter: blur(8px);
    padding: 18px 20px;
  }
  .card-mint {
    border-color: var(--mint20); background: var(--mint10);
  }
  .card-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: .24em;
    color: var(--white45); margin-bottom: 6px;
  }
  .card-label-mint { color: var(--mint); }
  .card-value { font-size: 26px; font-weight: 600; color: var(--mint); margin-bottom: 6px; }
  .card-sub { font-size: 12px; color: var(--white60); line-height: 1.5; }

  /* Feature card */
  .feat-icon {
    display: inline-flex; border-radius: 14px;
    border: 1px solid var(--mint20); background: var(--mint10);
    padding: 10px; color: var(--mint); margin-bottom: 14px;
  }
  .feat-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  .feat-body  { font-size: 12px; line-height: 1.65; color: var(--white60); }

  /* Grid helpers */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .grid4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 14px; }
  .grid-asym { display: grid; grid-template-columns: 1.25fr 0.9fr; gap: 20px; }
  .grid-asym2 { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 20px; }
  .grid-asym3 { display: grid; grid-template-columns: 1fr 1.1fr; gap: 20px; }

  /* Check chip */
  .chip {
    display: flex; align-items: center; gap: 10px;
    border: 1px solid var(--white10); border-radius: 14px;
    background: var(--white05); padding: 10px 14px;
    font-size: 13px; color: rgba(255,255,255,0.85);
  }
  .chip-check { width: 16px; height: 16px; color: var(--mint); flex-shrink: 0; }

  /* Comparison table */
  .comp-table { border: 1px solid var(--white10); border-radius: 24px; overflow: hidden; }
  .comp-head { display: grid; grid-template-columns: 1.6fr 1fr 1fr 1fr 1fr; background: var(--white05); }
  .comp-head-cell {
    padding: 12px 14px; font-size: 10px; text-transform: uppercase;
    letter-spacing: .2em; color: var(--white45); text-align: center;
  }
  .comp-head-cell:first-child { text-align: left; }
  .comp-head-cell.motion-col { color: var(--mint); }
  .comp-row { display: grid; grid-template-columns: 1.6fr 1fr 1fr 1fr 1fr; border-top: 1px solid var(--white10); }
  .comp-row-label { padding: 10px 14px; font-size: 12px; color: rgba(255,255,255,0.85); }
  .comp-cell { display: flex; align-items: center; justify-content: center; border-left: 1px solid var(--white10); padding: 10px; }
  .comp-dash { color: var(--white45); font-size: 14px; }

  /* Nav */
  .nav {
    position: fixed; bottom: 20px; right: 24px; z-index: 100;
    display: flex; align-items: center; gap: 18px;
    border: 1px solid var(--white10); border-radius: 99px;
    background: rgba(0,0,0,0.35); padding: 10px 20px;
    backdrop-filter: blur(16px);
  }
  .nav-btn {
    background: none; border: none; color: rgba(255,255,255,0.65);
    font-size: 13px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: color .2s;
  }
  .nav-btn:hover { color: #fff; }
  .nav-btn:disabled { color: rgba(255,255,255,0.2); cursor: default; }
  .nav-next {
    text-transform: uppercase; letter-spacing: .18em;
    font-size: 12px; color: rgba(255,255,255,0.8);
  }
  .nav-next:hover { color: var(--mint); }
  .nav-line {
    width: 60px; height: 1px; background: rgba(168,251,208,0.25);
    position: relative; overflow: hidden; display: inline-block; margin: 0 4px;
  }
  .nav-progress {
    position: absolute; left: 0; top: 0; height: 100%;
    background: var(--mint); transition: width .3s;
  }

  /* SVG icons */
  svg.icon { width: 18px; height: 18px; display: block; }
  svg.icon-sm { width: 14px; height: 14px; display: block; }

  /* Title slide */
  .title-map {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    background-image:
      linear-gradient(rgba(56,56,56,0.66), rgba(56,56,56,0.84)),
      url('https://images.unsplash.com/photo-1524661135-423995f22d0b?w=1600&q=80');
  }
  .title-map.loaded {
    background-image:
      linear-gradient(rgba(56,56,56,0.66), rgba(56,56,56,0.84)),
      var(--map-img);
  }
  .title-radial {
    position: absolute; inset: 0;
    background: radial-gradient(circle at center, rgba(168,251,208,0.16) 0%, transparent 32%);
  }
  .title-center {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
  }
  .title-logo-box {
    width: 140px; height: 140px; border-radius: 28px;
    border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
    box-shadow: 0 0 50px rgba(168,251,208,0.22); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 28px; font-size: 52px; font-weight: 700;
    color: var(--mint); font-family: 'DM Mono', monospace;
  }
  .title-wordmark { font-size: clamp(42px, 7vw, 72px); font-weight: 600; letter-spacing: -.02em; }
  .title-tag {
    font-size: clamp(12px, 1.2vw, 16px); font-weight: 500;
    text-transform: uppercase; letter-spacing: .28em; color: var(--mint); margin: 14px 0;
  }
  .title-desc { font-size: clamp(13px, 1.3vw, 17px); color: rgba(255,255,255,0.78); max-width: 640px; line-height: 1.7; }

  /* Progress dots */
  .dots {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; z-index: 99;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 99px;
    background: rgba(255,255,255,0.2); transition: all .3s;
  }
  .dot.active { background: var(--mint); width: 18px; }

  /* Scrollable body */
  .scroll-body { overflow-y: auto; flex: 1; }
  .scroll-body::-webkit-scrollbar { width: 4px; }
  .scroll-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

  /* Roadmap items */
  .roadmap-item {
    border: 1px solid var(--white10); border-radius: 12px;
    background: var(--white05); padding: 9px 14px;
    font-size: 12px; color: rgba(255,255,255,0.85);
  }

  /* Bar chart */
  .bar-chart { display: flex; align-items: flex-end; gap: 12px; height: 140px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { width: 100%; border-radius: 8px 8px 0 0; background: var(--mint); min-height: 4px; }
  .bar-label { font-size: 11px; color: var(--white45); font-family: 'DM Mono', monospace; }

  /* Team placeholder avatar */
  .avatar { width: 48px; height: 48px; border-radius: 14px; border: 1px solid var(--white10); background: var(--white05); margin-bottom: 12px; }

  .text-mint { color: var(--mint); }
  .text-muted { color: var(--white60); }
  .text-sm { font-size: 12px; }
  .text-xs { font-size: 11px; }
  .mt4 { margin-top: 4px; }
  .mt8 { margin-top: 8px; }
  .mt12 { margin-top: 12px; }
  .mt16 { margin-top: 16px; }
  .space-y > * + * { margin-top: 10px; }

  /* Agenda */
  .agenda-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .agenda-card { border: 1px solid var(--white10); border-radius: 20px; background: var(--white05); padding: 16px 18px; }
  .agenda-num { font-size: 10px; text-transform: uppercase; letter-spacing: .24em; color: var(--white45); margin-bottom: 6px; font-family: 'DM Mono', monospace; }
  .agenda-name { font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.9); }

  .layer-row {
    display: flex; align-items: center; justify-content: space-between;
    border: 1px solid var(--white10); border-radius: 12px;
    padding: 10px 14px; font-size: 13px;
  }
  .layer-tag { font-size: 11px; color: var(--mint); }
  .layer-tag-dim { font-size: 11px; color: rgba(255,255,255,.3); }

  .why-p { font-size: 13px; line-height: 1.65; color: rgba(255,255,255,0.74); padding: 10px 0; border-top: 1px solid var(--white10); }
  .why-p:first-child { border-top: none; }
</style>
</head>
<body>
<div id="root"></div>
<script>
const { createElement: h, useState, useEffect, useCallback, createContext, useContext } = React;

// ── Global logo URL (fetched once as blob to bypass Imgur hotlink block) ───
const LogoCtx = createContext(null);

function LogoProvider({ children }) {
  const [recoloredUrl, setRecoloredUrl] = useState(null);

  useEffect(() => {
    const img = new Image();
    img.crossOrigin = 'anonymous';

    const process = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const d = imageData.data;

      for (let i = 0; i < d.length; i += 4) {
        const r = d[i], g = d[i+1], b = d[i+2], a = d[i+3];
        if (a < 10) continue;

        const max = Math.max(r,g,b), min = Math.min(r,g,b);
        const sat = max === 0 ? 0 : (max - min) / max;
        const brightness = 0.299*r + 0.587*g + 0.114*b;

        if (sat > 0.15) {
          // Colored pixel (the green icon) → exact mint #a8fbd0
          d[i] = 0xa8; d[i+1] = 0xfb; d[i+2] = 0xd0;
        } else if (brightness < 160) {
          // Dark pixel (text, outlines) → white
          d[i] = d[i+1] = d[i+2] = 255;
        } else {
          // Light/mid neutral → white
          d[i] = d[i+1] = d[i+2] = 255;
        }
      }

      ctx.putImageData(imageData, 0, 0);
      setRecoloredUrl(canvas.toDataURL());
    };

    fetch('https://i.imgur.com/EYHHxAb.png', { referrerPolicy: 'no-referrer' })
      .then(r => r.blob())
      .then(blob => { img.onload = process; img.src = URL.createObjectURL(blob); })
      .catch(() => { img.onload = process; img.src = 'https://i.imgur.com/EYHHxAb.png'; });
  }, []);

  return h(LogoCtx.Provider, { value: recoloredUrl }, children);
}

function Logo({ variant = 'header' }) {
  const logoUrl = useContext(LogoCtx);

  if (variant === 'title') {
    if (logoUrl) return h('img', { src: logoUrl, alt: 'Motion', style: { height: 68, width: 'auto', objectFit: 'contain', marginBottom: 24 } });
    return h('div', { style: { color:'var(--mint)', fontFamily:"'DM Mono',monospace", fontWeight:700, fontSize:52, marginBottom:24 } }, 'M');
  }

  if (logoUrl) return h('img', { src: logoUrl, alt: 'Motion', style: { height: 26, width: 'auto', objectFit: 'contain', flexShrink: 0 } });
  return h('div', { style: { width:38, height:38, borderRadius:10, border:'1px solid rgba(255,255,255,0.15)', background:'rgba(255,255,255,0.05)', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--mint)', fontFamily:"'DM Mono',monospace", fontWeight:700, fontSize:18 }}, 'M');
}


// ── Icons (inline SVG) ──────────────────────────────────────────
const icons = {
  chevLeft:  `<polyline points="15 18 9 12 15 6"/>`,
  chevRight: `<polyline points="9 18 15 12 9 6"/>`,
  check:     `<polyline points="20 6 9 12 4 10"/>`,
  truck:     `<rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>`,
  bot:       `<rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/>`,
  shield:    `<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>`,
  dollar:    `<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>`,
  file:      `<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>`,
  alert:     `<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>`,
  brain:     `<path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/>`,
  cpu:       `<rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/>`,
  route:     `<circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/>`,
  search:    `<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>`,
  bar:       `<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>`,
  msg:       `<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>`,
};

function Icon({ name, size = 18, cls = '' }) {
  return h('svg', {
    xmlns: 'http://www.w3.org/2000/svg',
    width: size, height: size,
    viewBox: '0 0 24 24',
    fill: 'none', stroke: 'currentColor',
    strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round',
    className: cls,
    dangerouslySetInnerHTML: { __html: icons[name] }
  });
}

// ── Shared components ───────────────────────────────────────────
function Header({ index, total }) {
  return h('div', { className: 'deck-header' },
    h('div', { className: 'logo-pill' },
      h(Logo, { variant: 'header' }),
    ),
    h('div', { className: 'slide-counter' },
      String(index + 1).padStart(2, '0') + ' / ' + String(total).padStart(2, '0')
    )
  );
}

function SlideShell({ children, eyebrow, title, subtitle, index, total }) {
  return h('div', { className: 'slide' },
    h('div', { className: 'slide-glow' }),
    h('div', { className: 'slide-inner' },
      h(Header, { index, total }),
      h('div', { className: 'slide-main' },
        eyebrow && h('div', { className: 'eyebrow' }, eyebrow),
        title   && h('h1',  { className: 'slide-title' }, title),
        subtitle && h('p', { className: 'slide-subtitle' }, subtitle),
        h('div', { className: 'slide-body scroll-body' }, children)
      )
    )
  );
}

function StatCard({ label, value, sublabel }) {
  return h('div', { className: 'card' },
    h('div', { className: 'card-label' }, label),
    h('div', { className: 'card-value' }, value),
    sublabel && h('div', { className: 'card-sub' }, sublabel)
  );
}

function FeatureCard({ iconName, title, body }) {
  return h('div', { className: 'card', style: { padding: '18px 20px' } },
    h('div', { className: 'feat-icon' }, h(Icon, { name: iconName })),
    h('div', { className: 'feat-title' }, title),
    h('div', { className: 'feat-body'  }, body)
  );
}

function CheckChip({ label }) {
  return h('div', { className: 'chip' },
    h('svg', { xmlns: 'http://www.w3.org/2000/svg', width: 16, height: 16, viewBox: '0 0 24 24', fill: 'none', stroke: 'var(--mint)', strokeWidth: 2.5, strokeLinecap: 'round', strokeLinejoin: 'round', dangerouslySetInnerHTML: { __html: '<polyline points="20 6 9 12 4 10"/>' } }),
    label
  );
}

function CompRow({ label, motion=true, generic=false, legacy=false, point=false }) {
  const Cell = (on) => h('div', { className: 'comp-cell' },
    on
      ? h('svg', { xmlns: 'http://www.w3.org/2000/svg', width: 16, height: 16, viewBox: '0 0 24 24', fill: 'none', stroke: 'var(--mint)', strokeWidth: 2.5, strokeLinecap: 'round', strokeLinejoin: 'round', dangerouslySetInnerHTML: { __html: '<polyline points="20 6 9 12 4 10"/>' } })
      : h('span', { className: 'comp-dash' }, '—')
  );
  return h('div', { className: 'comp-row' },
    h('div', { className: 'comp-row-label' }, label),

const slides = [
  TitleSlide, AgendaSlide, ProblemSlide, SolutionSlide, ProductSlide,
  MarketSlide, BusinessModelSlide, TractionSlide, GTMSlide, CompetitionSlide,
  TechnologySlide, TeamSlide, FinancialSlide, FundraisingSlide, ClosingSlide,

function App() {
  const [current, setCurrent] = useState(0);
  const [animating, setAnimating] = useState(false);
  const total = slides.length;

  const go = useCallback((dir) => {
    if (animating) return;
    const next = dir === 1 ? (current === total - 1 ? 0 : current + 1) : Math.max(0, current - 1);
    if (next === current) return;
    setAnimating(true);
    setTimeout(() => { setCurrent(next); setAnimating(false); }, 300);
  }, [current, total, animating]);

  useEffect(() => {
    const onKey = (e) => {
      if (['ArrowRight','ArrowDown','d','D'].includes(e.key)) go(1);
      if (['ArrowLeft','ArrowUp','a','A'].includes(e.key))   go(-1);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [go]);

  const ActiveSlide = slides[current];
  const progress = (current / (total - 1)) * 100;

  return h('div', { style:{position:'relative',width:'100vw',height:'100vh',overflow:'hidden'} },
    h(ActiveSlide, { index: current, total }),

    // Nav
    h('div', { className:'nav' },
      h('button', { className:'nav-btn', onClick: () => go(-1), disabled: current === 0 },
        h('svg', { xmlns:'http://www.w3.org/2000/svg',width:14,height:14,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round',dangerouslySetInnerHTML:{__html:'<polyline points="15 18 9 12 15 6"/>'}}),'Prev'
      ),
      h('button', { className:'nav-btn nav-next', onClick: () => go(1) },
        current === total - 1 ? 'Back to Start' : 'Next Slide',
        h('span', { className:'nav-line' }, h('span', { className:'nav-progress', style:{width: animating ? '100%' : '0%'} })),
        h('svg', { xmlns:'http://www.w3.org/2000/svg',width:14,height:14,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round',dangerouslySetInnerHTML:{__html:'<polyline points="9 18 15 12 9 6"/>'}})
      )
    ),

    // Dots
    h('div', { className:'dots' },
      ...slides.map((_, i) =>
        h('div', { key:i, className:'dot' + (i === current ? ' active' : ''), onClick: () => !animating && setCurrent(i), style:{cursor:'pointer'} })
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(LogoProvider, null, h(App)));
</script>
</body>
</html>
